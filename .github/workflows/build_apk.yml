name: Build Android APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk build-essential libssl-dev libffi-dev libsqlite3-dev zlib1g-dev python3-dev python3-pip autoconf libtool pkg-config libltdl-dev ccache

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.0.11

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v1
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-toolkit-apk
          path: |
            bin/*.apk
            build.log
          retention-days: 30
